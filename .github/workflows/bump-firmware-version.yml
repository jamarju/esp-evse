name: bump-firmware-version

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump-firmware-version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compute next firmware version
        id: version
        run: python3 scripts/bump_firmware_version.py --write --github-output "$GITHUB_OUTPUT"

      - name: Commit and tag firmware release
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add openevse-tft.yaml
          git commit -m "chore: release ${{ steps.version.outputs.next_version }}"
          git tag "v${{ steps.version.outputs.next_version }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ steps.version.outputs.next_version }}"

      - name: Nothing to release
        if: steps.version.outputs.changed != 'true'
        run: echo "No feat/fix/perf/breaking changes since the last release tag."
